<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Payroll">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a5632">
<title>Daily Payroll - Footage Calculator 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:linear-gradient(135deg,#1a5632,#2d8a4e);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:1.3rem;font-weight:700}
.header .subtitle{font-size:.85rem;opacity:.85;margin-top:2px}
.toolbar{display:flex;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;align-items:center}
.toolbar label{font-size:.85rem;font-weight:600;color:#555}
.toolbar input,.toolbar select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:.9rem}
.toolbar input[type=date]{min-width:140px}
.container{max-width:900px;margin:0 auto;padding:12px}
.worker-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden}
.worker-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f7f9fc;border-bottom:1px solid #eee}
.worker-num{background:#1a5632;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.worker-info{display:flex;gap:8px;align-items:center;flex:1;margin-left:10px;flex-wrap:wrap}
.worker-info input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:.9rem}
.worker-info .name-input{width:180px}
.worker-info input.id-input{width:90px}
.worker-total{font-weight:700;color:#1a5632;font-size:1.05rem;white-space:nowrap}
.remove-worker{background:none;border:none;color:#c0392b;font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:4px}
.remove-worker:hover{background:#fde8e8}
.id-display{font-size:.75rem;color:#666;white-space:nowrap}
.jobs-table{width:100%;border-collapse:collapse}
.jobs-table th{background:#f0f4f0;padding:8px 6px;font-size:.75rem;text-transform:uppercase;color:#666;font-weight:600;text-align:center;border-bottom:1px solid #eee}
.jobs-table td{padding:6px 4px;text-align:center;border-bottom:1px solid #f5f5f5}
.jobs-table select,.jobs-table .cell-val{padding:5px 4px;border:1px solid #e0e0e0;border-radius:5px;font-size:.85rem;width:100%;text-align:center;background:#fff}
.jobs-table .cell-val{background:#f0faf0;font-weight:600;color:#1a5632;border:none}
.jobs-table .job-label{font-size:.8rem;color:#888;font-weight:500}
.jobs-table select:focus{outline:none;border-color:#2d8a4e;box-shadow:0 0 0 2px rgba(45,138,78,.15)}
.add-worker-btn{display:block;width:100%;padding:14px;background:#fff;border:2px dashed #ccc;border-radius:12px;font-size:1rem;color:#888;cursor:pointer;margin-bottom:14px;transition:all .2s;-webkit-tap-highlight-color:rgba(0,0,0,.1);touch-action:manipulation}
.add-worker-btn:hover,.add-worker-btn:active{border-color:#2d8a4e;color:#2d8a4e;background:#f0faf0}
.bottom-bar{position:sticky;bottom:0;background:#fff;border-top:2px solid #1a5632;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -2px 8px rgba(0,0,0,.1)}
.grand-total{font-size:1.1rem;font-weight:700;color:#1a5632}
.action-btns{display:flex;gap:8px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#1a5632;color:#fff}.btn-primary:hover{background:#14442a}
.btn-secondary{background:#e8f5e9;color:#1a5632}.btn-secondary:hover{background:#c8e6c9}
.btn-danger{background:#fde8e8;color:#c0392b}.btn-danger:hover{background:#f8c9c9}
.add-job-btn{display:block;width:100%;padding:8px;background:none;border:1px dashed #aaa;border-radius:0 0 12px 12px;font-size:.85rem;color:#888;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,.1)}
.add-job-btn:active{background:#f0faf0;color:#1a5632;border-color:#2d8a4e}
.remove-job-btn{background:none;border:none;color:#c0392b;font-size:1rem;cursor:pointer;padding:2px 6px;touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,.1)}
.search-wrap{position:relative;display:inline-block}
.search-list{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.15);-webkit-overflow-scrolling:touch}
.search-list.open{display:block}
.search-item{padding:10px 12px;font-size:.85rem;cursor:pointer;border-bottom:1px solid #f0f0f0;touch-action:manipulation}
.search-item:active,.search-item:hover{background:#e8f5e9}
.search-item .emp-id{font-size:.7rem;color:#888;margin-left:6px}
@media(max-width:600px){
  .worker-info .name-input{width:140px}
  .worker-info input.id-input{width:70px}
  .jobs-table th,.jobs-table td{padding:5px 2px;font-size:.75rem}
  .jobs-table select{font-size:.8rem;padding:4px 2px}
}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a5632;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9rem;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.save-indicator{display:flex;align-items:center;gap:6px;font-size:.78rem;color:#666;padding:4px 16px;background:#f7f9fc;border-bottom:1px solid #eee}
.save-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0;transition:background .3s}
.save-dot.saving{background:#FF9800;animation:pulse .6s ease-in-out}
.save-dot.unsaved{background:#ccc}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.restore-banner{background:#FFF3E0;border-bottom:2px solid #FF9800;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.restore-banner span{font-size:.88rem;color:#E65100;font-weight:600}
.restore-banner button{padding:6px 16px;border-radius:6px;border:none;font-size:.85rem;font-weight:600;cursor:pointer}
.restore-yes{background:#1a5632;color:#fff}
.restore-no{background:#eee;color:#555}
</style>
</head>

</div>
<div class="save-indicator">

  <label style="margin-left:12px">Date:</label>

  <label style="margin-left:12px">Supervisor:</label>

</div>

<div class="container" id="workersContainer"></div>
<div class="container">

</div>

<div class="bottom-bar">

</div>

var ROW_OPTIONS = [0.5, 1, 2, 3, 4, 5, 6];
var currentFarm = 'Farm 2';

var workerCount = 0;

function init() {
  document.getElementById('payrollDate').value = new Date().toISOString().split('T')[0];
  for (var i = 0; i < 3; i++) addWorker();

  // Wire up buttons with addEventListener (iPhone-friendly)
  document.getElementById('farmSelect').addEventListener('change', function(e) {
    currentFarm = e.target.value;
    var farm = FARMS[currentFarm];
    // Update area column visibility
    var areaCols = document.querySelectorAll('.area-col');
    for (var i = 0; i < areaCols.length; i++) {
      areaCols[i].style.display = farm.has_areas ? '' : 'none';
    }
    // Reset all existing area selects
    var areaSelects = document.querySelectorAll('select[id^="area-"]');
    for (var i = 0; i < areaSelects.length; i++) {
      var opts = '<option value="">--</option>';
      if (farm.has_areas) {
        for (var a = 0; a < farm.areas.length; a++) {
          opts += '<option value="' + farm.areas[a] + '">' + farm.areas[a] + '</option>';
        }
      }
      areaSelects[i].innerHTML = opts;
    }
    // Reset all existing field selects with new farm's fields
    var fieldSelects = document.querySelectorAll('select[id^="field-"]');
    for (var i = 0; i < fieldSelects.length; i++) {
      var opts = '<option value="">--</option>';
      if (!farm.has_areas) {
        for (var f = 0; f < farm.fields.length; f++) {
          opts += '<option value="' + farm.fields[f] + '">' + farm.fields[f] + '</option>';
        }
      }
      fieldSelects[i].innerHTML = opts;
    }
    // Reset all block selects and values
    var blockSelects = document.querySelectorAll('select[id^="block-"]');
    for (var i = 0; i < blockSelects.length; i++) {
      blockSelects[i].innerHTML = '<option value="">--</option>';
    }
    var ftEls = document.querySelectorAll('[id^="ftrow-"]');
    for (var i = 0; i < ftEls.length; i++) { ftEls[i].textContent = '-'; }
    var unitEls = document.querySelectorAll('[id^="units-"]');
    for (var i = 0; i < unitEls.length; i++) { unitEls[i].textContent = '-'; }
  });
  document.getElementById('addWorkerBtn').addEventListener('click', function(e) { e.preventDefault(); addWorker(); });
  document.getElementById('clearBtn').addEventListener('click', function(e) { e.preventDefault(); clearAll(); });
  document.getElementById('copyBtn').addEventListener('click', function(e) { e.preventDefault(); copyToClipboard(); });
  document.getElementById('shareBtn').addEventListener('click', function(e) { e.preventDefault(); generateSummary(); });

  // Change handler for area/field/block/rows selects
  document.getElementById('workersContainer').addEventListener('change', function(e) {
    var el = e.target;
    var id = el.id || '';
    if (id.indexOf('area-') === 0) { onAreaChange(id.replace('area-','')); }
    else if (id.indexOf('field-') === 0) { onFieldChange(id.replace('field-','')); }
    else if (id.indexOf('block-') === 0) { onBlockChange(id.replace('block-','')); }
    else if (id.indexOf('rows-') === 0) { calcUnits(id.replace('rows-','')); }
  });

  // Search input handler
  document.getElementById('workersContainer').addEventListener('input', function(e) {
    var el = e.target;
    if (el.id && el.id.indexOf('wname-') === 0) {
      var wid = el.id.replace('wname-', '');
      var query = el.value.toLowerCase();
      var listEl = document.getElementById('slist-' + wid);
      if (!listEl) return;
      if (query.length < 1) { listEl.classList.remove('open'); listEl.innerHTML = ''; return; }
      var matches = EMPLOYEES.filter(function(emp) {
        return emp.name.toLowerCase().indexOf(query) > -1 || emp.id.toLowerCase().indexOf(query) > -1;
      }).slice(0, 15);
      if (matches.length === 0) { listEl.classList.remove('open'); listEl.innerHTML = ''; return; }
      listEl.innerHTML = matches.map(function(emp) {
        return '<div class="search-item" data-empid="' + emp.id + '" data-name="' + emp.name.replace(/"/g,'&quot;') + '" data-petition="' + emp.petition + '" data-wid="' + wid + '">' + emp.name + '<span class="emp-id">' + emp.id + '</span></div>';
      }).join('');
      listEl.classList.add('open');
      // Clear hidden id since user is typing
      document.getElementById('wempid-' + wid).value = '';
      document.getElementById('wid-' + wid).textContent = '';
    }
  });

  // Search item click handler
  document.getElementById('workersContainer').addEventListener('click', function(ev) {
    var el = ev.target.closest ? ev.target.closest('.search-item') : null;
    if (!el && ev.target.classList.contains('search-item')) el = ev.target;
    if (!el && ev.target.parentElement && ev.target.parentElement.classList.contains('search-item')) el = ev.target.parentElement;
    if (el && el.classList.contains('search-item')) {
      var wid = el.getAttribute('data-wid');
      var empid = el.getAttribute('data-empid');
      var name = el.getAttribute('data-name');
      var petition = el.getAttribute('data-petition');
      document.getElementById('wname-' + wid).value = name;
      document.getElementById('wempid-' + wid).value = empid;
      document.getElementById('wid-' + wid).textContent = empid + ' | ' + petition;
      document.getElementById('slist-' + wid).classList.remove('open');
      document.getElementById('slist-' + wid).innerHTML = '';
      return;
    }

    // Other click handlers (remove worker, add/remove job)
    if (ev.target.classList.contains('remove-worker')) {
      var wid = ev.target.getAttribute('data-wid');
      if (wid) removeWorker(wid);
    }
    if (ev.target.classList.contains('add-job-btn')) {
      var wid = ev.target.getAttribute('data-wid');
      if (wid) addJob(wid);
    }
    if (ev.target.classList.contains('remove-job-btn')) {
      var jid = ev.target.getAttribute('data-jid');
      var wid = ev.target.getAttribute('data-wid');
      if (jid && wid) removeJob(jid, wid);
    }
  });
}

var workerJobCounts = {};

function buildJobRow(wid, j) {
  var jid = wid + '-' + j;
  var farm = FARMS[currentFarm];
  var areaDisplay = farm.has_areas ? '' : 'display:none';
  var areaOpts = '<option value="">--</option>';
  if (farm.has_areas) {
    areaOpts += farm.areas.map(function(a){return '<option value="'+a+'">'+a+'</option>';}).join('');
  }
  var fieldOpts = '<option value="">--</option>';
  if (!farm.has_areas) {
    fieldOpts += farm.fields.map(function(f){return '<option value="'+f+'">'+f+'</option>';}).join('');
  }
  return '<tr id="job-' + jid + '">' +
    '<td class="job-label">' + j + '</td>' +
    '<td class="area-col" style="' + areaDisplay + '"><select id="area-' + jid + '" style="min-width:55px">' + areaOpts + '</select></td>' +
    '<td><select id="field-' + jid + '" style="min-width:60px">' + fieldOpts + '</select></td>' +
    '<td><select id="block-' + jid + '" style="min-width:55px"><option value="">--</option></select></td>' +
    '<td><div class="cell-val" id="ftrow-' + jid + '">-</div></td>' +
    '<td><select id="rows-' + jid + '" style="min-width:50px">' +
      '<option value="">--</option>' + ROW_OPTIONS.map(function(r){return '<option value="'+r+'">'+r+'</option>';}).join('') +
    '</select></td>' +
    '<td><div class="cell-val" id="units-' + jid + '">-</div></td>' +
    '<td><button class="remove-job-btn" data-jid="' + jid + '" data-wid="' + wid + '" title="Remove job">&times;</button></td>' +
  '</tr>';
}

function addWorker() {
  workerCount++;
  var wid = workerCount;
  workerJobCounts[wid] = 1;
  var card = document.createElement('div');
  card.className = 'worker-card';
  card.id = 'worker-' + wid;

  card.innerHTML =
    '<div class="worker-header">' +
      '<div class="worker-num">' + wid + '</div>' +
      '<div class="worker-info">' +
        '<div class="search-wrap" id="swrap-' + wid + '">' +
          '<input type="text" class="name-input" id="wname-' + wid + '" placeholder="Type worker name..." autocomplete="off">' +
          '<input type="hidden" id="wempid-' + wid + '">' +
          '<div class="search-list" id="slist-' + wid + '"></div>' +
        '</div>' +
        '<span class="id-display" id="wid-' + wid + '"></span>' +
      '</div>' +
      '<div class="worker-total" id="wtotal-' + wid + '">0.00</div>' +
      '<button class="remove-worker" data-wid="' + wid + '" title="Remove">&times;</button>' +
    '</div>' +
    '<table class="jobs-table">' +
      '<thead><tr><th>#</th><th class="area-col"' + (FARMS[currentFarm].has_areas ? '' : ' style="display:none"') + '>Area</th><th>Field</th><th>Blk</th><th>Ft/Row</th><th>Rows</th><th>Units</th><th></th></tr></thead>' +
      '<tbody id="jobs-' + wid + '">' + buildJobRow(wid, 1) + '</tbody>' +
    '</table>' +
    '<button class="add-job-btn" data-wid="' + wid + '">+ Add Job</button>';

  document.getElementById('workersContainer').appendChild(card);
}

function addJob(wid) {
  var tbody = document.getElementById('jobs-' + wid);
  if (!tbody) return;
  workerJobCounts[wid] = (workerJobCounts[wid] || 0) + 1;
  var j = workerJobCounts[wid];
  var temp = document.createElement('tbody');
  temp.innerHTML = buildJobRow(wid, j);
  var newRow = temp.firstChild;
  tbody.appendChild(newRow);
}

function removeJob(jid, wid) {
  var row = document.getElementById('job-' + jid);
  if (row) {
    row.remove();
    updateWorkerTotal(wid);
    updateGrandTotal();
  }
}

function removeWorker(wid) {
  var el = document.getElementById('worker-' + wid);
  if (el) { el.remove(); updateGrandTotal(); }
}

function onAreaChange(jid) {
  var area = document.getElementById('area-' + jid).value;
  var fieldSel = document.getElementById('field-' + jid);
  var blockSel = document.getElementById('block-' + jid);
  var farm = FARMS[currentFarm];
  fieldSel.innerHTML = '<option value="">--</option>';
  blockSel.innerHTML = '<option value="">--</option>';
  document.getElementById('ftrow-' + jid).textContent = '-';
  document.getElementById('units-' + jid).textContent = '-';
  if (area && farm.area_fields && farm.area_fields[area]) {
    farm.area_fields[area].forEach(function(f) {
      fieldSel.innerHTML += '<option value="'+f+'">'+f+'</option>';
    });
  }
  calcUnits(jid);
}

function onFieldChange(jid) {
  var field = document.getElementById('field-' + jid).value;
  var blockSel = document.getElementById('block-' + jid);
  var farm = FARMS[currentFarm];
  blockSel.innerHTML = '<option value="">--</option>';
  document.getElementById('ftrow-' + jid).textContent = '-';
  document.getElementById('units-' + jid).textContent = '-';
  if (field && farm.field_blocks[field]) {
    farm.field_blocks[field].forEach(function(b) {
      blockSel.innerHTML += '<option value="'+b+'">'+b+'</option>';
    });
  }
  calcUnits(jid);
}

function onBlockChange(jid) {
  var field = document.getElementById('field-' + jid).value;
  var block = document.getElementById('block-' + jid).value;
  var ftEl = document.getElementById('ftrow-' + jid);
  var farm = FARMS[currentFarm];
  if (field && block) {
    var key = field + '|' + block;
    var ft = farm.footage_lookup[key];
    ftEl.textContent = ft !== undefined ? ft : '??';
  } else {
    ftEl.textContent = '-';
  }
  calcUnits(jid);
}

function calcUnits(jid) {
  const ftText = document.getElementById('ftrow-' + jid).textContent;
  const rowsVal = document.getElementById('rows-' + jid).value;
  const unitsEl = document.getElementById('units-' + jid);
  const ft = parseFloat(ftText);
  const rows = parseFloat(rowsVal);
  if (!isNaN(ft) && !isNaN(rows) && ft > 0 && rows > 0) {
    unitsEl.textContent = ((ft * rows) / 100).toFixed(2);
  } else {
    unitsEl.textContent = '-';
  }
  updateWorkerTotal(jid.split('-')[0]);
  updateGrandTotal();
}

function updateWorkerTotal(wid) {
  var total = 0;
  var tbody = document.getElementById('jobs-' + wid);
  if (tbody) {
    var unitEls = tbody.querySelectorAll('[id^="units-"]');
    for (var i = 0; i < unitEls.length; i++) {
      var v = parseFloat(unitEls[i].textContent);
      if (!isNaN(v)) total += v;
    }
  }
  var el = document.getElementById('wtotal-' + wid);
  if (el) el.textContent = total.toFixed(2);
}

function updateGrandTotal() {
  let gt = 0;
  document.querySelectorAll('[id^="wtotal-"]').forEach(el => {
    const v = parseFloat(el.textContent);
    if (!isNaN(v)) gt += v;
  });
  document.getElementById('grandTotal').textContent = gt.toFixed(2);
}

function buildSummaryText() {
  const date = document.getElementById('payrollDate').value;
  const sup = document.getElementById('supervisorName').value || 'N/A';
  let lines = [];
  lines.push('DAILY PAYROLL - ' + date + ' - ' + currentFarm);
  lines.push('Supervisor: ' + sup);
  lines.push('---');
  
  document.querySelectorAll('.worker-card').forEach(card => {
    const wid = card.id.replace('worker-', '');
    var name = document.getElementById('wname-' + wid) ? document.getElementById('wname-' + wid).value : '';
    var empId = document.getElementById('wempid-' + wid) ? document.getElementById('wempid-' + wid).value : '';
    var idInfo = document.getElementById('wid-' + wid) ? document.getElementById('wid-' + wid).textContent : '';
    var total = document.getElementById('wtotal-' + wid) ? document.getElementById('wtotal-' + wid).textContent : '0.00';

    if (!name && parseFloat(total) === 0) return;

    lines.push('');
    lines.push('#' + wid + ' ' + (name || 'Unnamed') + (idInfo ? ' (' + idInfo + ')' : ''));
    
    var tbody = document.getElementById('jobs-' + wid);
    if (tbody) {
      var jobRows = tbody.querySelectorAll('tr[id^="job-"]');
      for (var ji = 0; ji < jobRows.length; ji++) {
        var jid = jobRows[ji].id.replace('job-', '');
        var areaEl = document.getElementById('area-' + jid);
        var fieldEl = document.getElementById('field-' + jid);
        var blockEl = document.getElementById('block-' + jid);
        var ftrowEl = document.getElementById('ftrow-' + jid);
        var rowsEl = document.getElementById('rows-' + jid);
        var unitsEl = document.getElementById('units-' + jid);
        var area = areaEl ? areaEl.value : '';
        var field = fieldEl ? fieldEl.value : '';
        var block = blockEl ? blockEl.value : '';
        var ftrow = ftrowEl ? ftrowEl.textContent : '';
        var rows = rowsEl ? rowsEl.value : '';
        var units = unitsEl ? unitsEl.textContent : '';
        if (field && block && units !== '-') {
          var jobLine = '  Job ' + (ji+1) + ': ';
          if (area) jobLine += 'Area ' + area + ', ';
          jobLine += 'Field ' + field + ', Blk ' + block + ', ' + ftrow + ' ft/row x ' + rows + ' rows = ' + units + ' units';
          lines.push(jobLine);
        }
      }
    }
    lines.push('  TOTAL: ' + total + ' units');
  });
  
  lines.push('');
  lines.push('GRAND TOTAL: ' + document.getElementById('grandTotal').textContent + ' units');
  return lines.join('\n');
}

function copyToClipboard() {
  const text = buildSummaryText();
  navigator.clipboard.writeText(text).then(() => showToast('Copied! Paste into a text message.'));
}

}

// === PDF REPORT GENERATION ===
function loadJsPDF(callback) {
  if (window.jspdf) { callback(); return; }
  var script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  script.onload = callback;
  script.onerror = function() {
    showToast('Could not load PDF library. Check your internet connection.');
  };
  document.head.appendChild(script);
}

function generatePDF() {
  loadJsPDF(function() { _buildPDF(); });
}

function _buildPDF() {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF('p', 'mm', 'letter');
  var pageW = 215.9;
  var pageH = 279.4;
  var margin = 15;
  var usableW = pageW - margin * 2;
  var y = margin;

  var date = document.getElementById('payrollDate').value || 'N/A';
  var sup = document.getElementById('supervisorName').value || 'N/A';
  var farm = FARMS[currentFarm];
  var hasAreas = farm.has_areas;

  // Format date nicely
  var dateDisplay = date;
  if (date && date.indexOf('-') > -1) {
    var parts = date.split('-');
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    dateDisplay = months[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
  }

  // Helper: check if we need a new page
  function checkPage(needed) {
    if (y + needed > pageH - 20) {
      doc.addPage();
      y = margin;
    }
  }

  // ── HEADER BAR ──
  doc.setFillColor(26, 86, 50);
  doc.rect(0, 0, pageW, 32, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('DAILY PAYROLL REPORT', margin, 14);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Eberry Harvesting LLC', margin, 21);
  doc.setFontSize(9);
  doc.text('Licensed Farm Labor Contractor', margin, 27);

  // Right side of header
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text(currentFarm, pageW - margin, 14, { align: 'right' });
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text(dateDisplay, pageW - margin, 21, { align: 'right' });
  doc.text('Supervisor: ' + sup, pageW - margin, 27, { align: 'right' });

  y = 40;

  // ── SUMMARY BAR ──
  var workerCards = document.querySelectorAll('.worker-card');
  var totalWorkers = 0;
  var totalJobs = 0;
  var grandTotal = document.getElementById('grandTotal').textContent;

  workerCards.forEach(function(card) {
    var wid = card.id.replace('worker-', '');
    var name = document.getElementById('wname-' + wid) ? document.getElementById('wname-' + wid).value : '';
    var total = document.getElementById('wtotal-' + wid) ? parseFloat(document.getElementById('wtotal-' + wid).textContent) : 0;
    if (name || total > 0) {
      totalWorkers++;
      var tbody = document.getElementById('jobs-' + wid);
      if (tbody) totalJobs += tbody.querySelectorAll('tr[id^="job-"]').length;
    }
  });

  doc.setFillColor(247, 249, 252);
  doc.rect(margin, y, usableW, 10, 'F');
  doc.setDrawColor(200, 200, 200);
  doc.rect(margin, y, usableW, 10, 'S');
  doc.setTextColor(80, 80, 80);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.text('Workers: ' + totalWorkers + '    |    Jobs: ' + totalJobs + '    |    Grand Total: ' + grandTotal + ' units', margin + 4, y + 7);
  y += 16;

  // ── WORKER SECTIONS ──
  var workerNum = 0;
  workerCards.forEach(function(card) {
    var wid = card.id.replace('worker-', '');
    var name = document.getElementById('wname-' + wid) ? document.getElementById('wname-' + wid).value : '';
    var empId = document.getElementById('wempid-' + wid) ? document.getElementById('wempid-' + wid).value : '';
    var idInfo = document.getElementById('wid-' + wid) ? document.getElementById('wid-' + wid).textContent : '';
    var workerTotal = document.getElementById('wtotal-' + wid) ? document.getElementById('wtotal-' + wid).textContent : '0.00';

    if (!name && parseFloat(workerTotal) === 0) return;
    workerNum++;

    // Collect jobs data
    var jobs = [];
    var tbody = document.getElementById('jobs-' + wid);
    if (tbody) {
      var jobRows = tbody.querySelectorAll('tr[id^="job-"]');
      for (var ji = 0; ji < jobRows.length; ji++) {
        var jid = jobRows[ji].id.replace('job-', '');
        var area = document.getElementById('area-' + jid) ? document.getElementById('area-' + jid).value : '';
        var field = document.getElementById('field-' + jid) ? document.getElementById('field-' + jid).value : '';
        var block = document.getElementById('block-' + jid) ? document.getElementById('block-' + jid).value : '';
        var ftrow = document.getElementById('ftrow-' + jid) ? document.getElementById('ftrow-' + jid).textContent : '';
        var rows = document.getElementById('rows-' + jid) ? document.getElementById('rows-' + jid).value : '';
        var units = document.getElementById('units-' + jid) ? document.getElementById('units-' + jid).textContent : '';
        if (field && block && units !== '-') {
          jobs.push({ area: area, field: field, block: block, ftrow: ftrow, rows: rows, units: units });
        }
      }
    }

    // Space needed: worker header (8) + table header (6) + jobs (6 each) + total row (8) + spacing (6)
    var blockHeight = 8 + 6 + (jobs.length * 6) + 8 + 6;
    checkPage(blockHeight);

    // Worker name bar
    doc.setFillColor(26, 86, 50);
    doc.rect(margin, y, usableW, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text(workerNum + '.  ' + (name || 'Unnamed'), margin + 3, y + 5.5);
    if (idInfo) {
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.text(idInfo, pageW - margin - 3, y + 5.5, { align: 'right' });
    }
    y += 8;

    // Table header
    doc.setFillColor(240, 244, 240);
    doc.rect(margin, y, usableW, 6, 'F');
    doc.setDrawColor(200, 210, 200);
    doc.line(margin, y + 6, margin + usableW, y + 6);
    doc.setTextColor(100, 100, 100);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');

    var colX;
    if (hasAreas) {
      colX = { job: margin+3, area: margin+18, field: margin+40, block: margin+65, ftrow: margin+90, rows: margin+120, units: margin+148 };
    } else {
      colX = { job: margin+3, field: margin+25, block: margin+55, ftrow: margin+85, rows: margin+120, units: margin+148 };
    }

    doc.text('#', colX.job, y + 4);
    if (hasAreas) doc.text('AREA', colX.area, y + 4);
    doc.text('FIELD', colX.field, y + 4);
    doc.text('BLOCK', colX.block, y + 4);
    doc.text('FT/ROW', colX.ftrow, y + 4);
    doc.text('ROWS', colX.rows, y + 4);
    doc.text('UNITS', colX.units, y + 4);
    y += 6;

    // Job rows
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(50, 50, 50);
    doc.setFontSize(8);
    for (var j = 0; j < jobs.length; j++) {
      checkPage(6);
      if (j % 2 === 0) {
        doc.setFillColor(252, 252, 252);
        doc.rect(margin, y, usableW, 6, 'F');
      }
      doc.text('' + (j+1), colX.job, y + 4);
      if (hasAreas) doc.text(jobs[j].area, colX.area, y + 4);
      doc.text(jobs[j].field, colX.field, y + 4);
      doc.text(jobs[j].block, colX.block, y + 4);
      doc.text(jobs[j].ftrow, colX.ftrow, y + 4);
      doc.text(jobs[j].rows, colX.rows, y + 4);
      doc.setFont('helvetica', 'bold');
      doc.text(jobs[j].units, colX.units, y + 4);
      doc.setFont('helvetica', 'normal');
      y += 6;
    }

    // Worker total row
    doc.setFillColor(232, 245, 233);
    doc.rect(margin, y, usableW, 7, 'F');
    doc.setDrawColor(26, 86, 50);
    doc.line(margin, y, margin + usableW, y);
    doc.setTextColor(26, 86, 50);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text('WORKER TOTAL:', colX.ftrow - 10, y + 5);
    doc.text(workerTotal + ' units', colX.units, y + 5);
    y += 12;
  });

  // ── GRAND TOTAL BAR ──
  checkPage(16);
  doc.setFillColor(26, 86, 50);
  doc.rect(margin, y, usableW, 12, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('GRAND TOTAL', margin + 4, y + 8.5);
  doc.text(grandTotal + ' units', pageW - margin - 4, y + 8.5, { align: 'right' });
  y += 16;

  // ── FOOTER ──
  doc.setTextColor(160, 160, 160);
  doc.setFontSize(7);
  doc.setFont('helvetica', 'normal');
  var now = new Date();
  var timeStr = now.toLocaleString();
  doc.text('Generated: ' + timeStr + '  |  Eberry Harvesting LLC  |  Daily Payroll - Footage Calculator 2026', margin, pageH - 8);

  // Save
  var filename = 'Payroll-' + currentFarm.replace(' ', '') + '-' + (date || 'nodate') + '.pdf';
  doc.save(filename);
}

// === AUTO-SAVE SYSTEM ===
var SAVE_KEY = 'dailyPayroll_autosave';
var saveTimer = null;
var pendingSave = false;

function gatherState() {
  var state = {
    farm: currentFarm,
    date: document.getElementById('payrollDate').value,
    supervisor: document.getElementById('supervisorName').value,
    savedAt: new Date().toISOString(),
    workers: []
  };
  document.querySelectorAll('.worker-card').forEach(function(card) {
    var wid = card.id.replace('worker-', '');
    var w = {
      wid: wid,
      name: document.getElementById('wname-' + wid) ? document.getElementById('wname-' + wid).value : '',
      empId: document.getElementById('wempid-' + wid) ? document.getElementById('wempid-' + wid).value : '',
      idDisplay: document.getElementById('wid-' + wid) ? document.getElementById('wid-' + wid).textContent : '',
      jobs: []
    };
    var tbody = document.getElementById('jobs-' + wid);
    if (tbody) {
      tbody.querySelectorAll('tr[id^="job-"]').forEach(function(row) {
        var jid = row.id.replace('job-', '');
        w.jobs.push({
          jid: jid,
          area: document.getElementById('area-' + jid) ? document.getElementById('area-' + jid).value : '',
          field: document.getElementById('field-' + jid) ? document.getElementById('field-' + jid).value : '',
          block: document.getElementById('block-' + jid) ? document.getElementById('block-' + jid).value : '',
          rows: document.getElementById('rows-' + jid) ? document.getElementById('rows-' + jid).value : ''
        });
      });
    }
    state.workers.push(w);
  });
  return state;
}

function autoSave() {
  try {
    var state = gatherState();
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    updateSaveIndicator(state.savedAt);
  } catch(e) {
    console.warn('Auto-save failed:', e);
  }
}

function scheduleSave() {
  var dot = document.getElementById('saveDot');
  if (dot) { dot.className = 'save-dot saving'; }
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    autoSave();
  }, 1000);
}

function updateSaveIndicator(isoTime) {
  var dot = document.getElementById('saveDot');
  var status = document.getElementById('saveStatus');
  if (!dot || !status) return;
  dot.className = 'save-dot';
  var d = new Date(isoTime);
  var h = d.getHours();
  var m = d.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  m = m < 10 ? '0' + m : m;
  status.textContent = 'Auto-saved at ' + h + ':' + m + ' ' + ampm;
}

function checkForSavedData() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    var state = JSON.parse(raw);
    if (state && state.workers && state.workers.length > 0) {
      var hasData = state.workers.some(function(w) { return w.name || w.jobs.some(function(j) { return j.field; }); });
      if (hasData) {
        document.getElementById('restoreBanner').style.display = 'flex';
      }
    }
  } catch(e) {}
}

function restoreSavedData() {
  document.getElementById('restoreBanner').style.display = 'none';
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    var state = JSON.parse(raw);

    // Restore farm FIRST (before creating workers, so dropdowns build correctly)
    if (state.farm && FARMS[state.farm]) {
      document.getElementById('farmSelect').value = state.farm;
      currentFarm = state.farm;
    }
    // Restore date and supervisor
    if (state.date) document.getElementById('payrollDate').value = state.date;
    if (state.supervisor) document.getElementById('supervisorName').value = state.supervisor;

    // Clear existing workers
    document.getElementById('workersContainer').innerHTML = '';
    workerCount = 0;
    workerJobCounts = {};

    // Rebuild each worker
    state.workers.forEach(function(w) {
      addWorker();
      // addWorker does workerCount++ first, then wid = workerCount
      // so after addWorker, the new worker's id is workerCount
      var wid = workerCount;

      // Set name and employee info
      var nameEl = document.getElementById('wname-' + wid);
      if (nameEl && w.name) nameEl.value = w.name;
      var empIdEl = document.getElementById('wempid-' + wid);
      if (empIdEl && w.empId) empIdEl.value = w.empId;
      var idEl = document.getElementById('wid-' + wid);
      if (idEl && w.idDisplay) idEl.textContent = w.idDisplay;

      // Rebuild job rows from saved data
      var tbody = document.getElementById('jobs-' + wid);
      if (tbody && w.jobs.length > 0) {
        // Clear the default job row that addWorker created
        tbody.innerHTML = '';
        workerJobCounts[wid] = 0;

        w.jobs.forEach(function(job) {
          // addJob increments workerJobCounts then uses it as j
          addJob(wid);
          var jid = wid + '-' + workerJobCounts[wid];

          // Set area and populate field dropdown
          var areaEl = document.getElementById('area-' + jid);
          if (areaEl && job.area) {
            // Manually populate area options first
            var farm = FARMS[currentFarm];
            if (farm.has_areas && farm.areas) {
              areaEl.innerHTML = '<option value="">--</option>';
              farm.areas.forEach(function(a) {
                areaEl.innerHTML += '<option value="'+a+'">'+a+'</option>';
              });
            }
            areaEl.value = job.area;
            onAreaChange(jid);
          }

          // Set field and populate block dropdown
          var fieldEl = document.getElementById('field-' + jid);
          if (fieldEl && job.field) {
            fieldEl.value = job.field;
            onFieldChange(jid);
          }

          // Set block and trigger footage lookup
          var blockEl = document.getElementById('block-' + jid);
          if (blockEl && job.block) {
            blockEl.value = job.block;
            onBlockChange(jid);
          }

          // Set rows and recalculate units
          var rowsEl = document.getElementById('rows-' + jid);
          if (rowsEl && job.rows) {
            rowsEl.value = job.rows;
            calcUnits(jid);
          }
        });
      }
    });

    updateGrandTotal();
    if (state.savedAt) updateSaveIndicator(state.savedAt);
    showToast('Previous session restored!');
  } catch(e) {
    console.warn('Restore failed:', e);
    showToast('Could not restore — starting fresh');
  }
}

function dismissRestore() {
  document.getElementById('restoreBanner').style.display = 'none';
  localStorage.removeItem(SAVE_KEY);
}

// Hook auto-save into all input changes
document.addEventListener('input', scheduleSave);
document.addEventListener('change', scheduleSave);

// Also save when the page is about to close (backup)
window.addEventListener('beforeunload', function() {
  if (saveTimer) { clearTimeout(saveTimer); autoSave(); }
});

// Override clearAll to also clear saved data
var _originalClearAll = clearAll;
clearAll = function() {
  _originalClearAll();
  localStorage.removeItem(SAVE_KEY);
  var dot = document.getElementById('saveDot');
  var status = document.getElementById('saveStatus');
  if (dot) dot.className = 'save-dot unsaved';
  if (status) status.textContent = 'Cleared — not saved';
};

document.addEventListener('DOMContentLoaded', function() {
  init();
  checkForSavedData();
});

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}
</script>
</body>
